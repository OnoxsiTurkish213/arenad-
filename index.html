<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>HaxBall Mobile Pro v6</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-touch-callout:none;-webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a1a;font-family:'Segoe UI',Tahoma,sans-serif;touch-action:none;position:fixed;top:0;left:0}

/* Yatay uyarı - portrait modda göster */
#rotateMsg{position:fixed;top:0;left:0;width:100%;height:100%;background:#0a0a1a;z-index:99999;display:none;align-items:center;justify-content:center;flex-direction:column;color:#fff;gap:12px;font-size:15px;text-align:center;padding:20px}
@media(orientation:portrait){#rotateMsg{display:flex!important}}

.screen{position:absolute;top:0;left:0;width:100%;height:100%;display:none;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* ===== MENU ===== */
#menuScreen{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;background:linear-gradient(145deg,#0b0920,#1a1545,#0d1b3e);z-index:100;padding:16px 12px;overflow-y:auto}
#menuScreen h1{color:#fff;font-size:26px;margin-bottom:2px;margin-top:8px;flex-shrink:0}
#menuScreen .sub{color:#666;font-size:11px;margin-bottom:16px;flex-shrink:0}
.mbox{background:rgba(255,255,255,.05);border-radius:16px;padding:18px;width:100%;max-width:340px;border:1px solid rgba(255,255,255,.07)}
.mbox input{width:100%;padding:13px 14px;margin-bottom:10px;border:1px solid rgba(255,255,255,.15);border-radius:9px;background:rgba(255,255,255,.06);color:#fff;font-size:15px;outline:none;-webkit-appearance:none;-webkit-text-size-adjust:100%}
.mbox input::placeholder{color:rgba(255,255,255,.3)}
.mbox label{color:#888;font-size:11px;display:block;margin-bottom:4px;margin-top:2px}
.divider{display:flex;align-items:center;margin:12px 0;color:rgba(255,255,255,.18);font-size:11px;gap:8px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(255,255,255,.08)}
.btn{padding:12px 18px;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;color:#fff;display:inline-block;-webkit-appearance:none}
.btn:active{transform:scale(.96);opacity:.9}
.btn-full{width:100%;margin-bottom:8px;padding:13px}
.btn-red{background:linear-gradient(135deg,#e74c3c,#b92d2d)}
.btn-blue{background:linear-gradient(135deg,#3498db,#2475a8)}
.btn-green{background:linear-gradient(135deg,#27ae60,#1c8a4a)}
.btn-gray{background:rgba(255,255,255,.08);color:#aaa;border:1px solid rgba(255,255,255,.08)}
.btn-small{padding:8px 14px;font-size:12px;border-radius:7px}

/* ===== LOBİ ===== */
#lobbyScreen{flex-direction:column;align-items:center;background:linear-gradient(145deg,#0b0920,#1a1545,#0d1b3e);z-index:95;padding:14px}
#lobbyScreen h2{color:#fff;font-size:20px;margin-bottom:4px;flex-shrink:0}
.room-code-box{background:rgba(243,156,18,.1);border:1px solid rgba(243,156,18,.2);color:#f39c12;font-size:15px;font-weight:700;padding:5px 16px;border-radius:8px;margin-bottom:4px;flex-shrink:0}
.lobby-map-info{color:#aaa;font-size:12px;margin-bottom:10px;flex-shrink:0}
.lobby-teams{display:flex;gap:8px;width:96%;max-width:920px;flex-wrap:wrap;justify-content:center;flex-shrink:0}
.team-panel{background:rgba(255,255,255,.03);border-radius:12px;padding:10px;min-width:150px;flex:1;border:1px solid rgba(255,255,255,.05);min-height:90px}
.team-panel h3{text-align:center;margin-bottom:8px;font-size:12px;padding-bottom:5px;border-bottom:1px solid rgba(255,255,255,.06)}
.team-panel.t-red h3{color:#e74c3c}.team-panel.t-blue h3{color:#3498db}.team-panel.t-spec h3{color:#777}
.player-row{display:flex;align-items:center;justify-content:space-between;padding:4px 7px;margin-bottom:3px;border-radius:6px;background:rgba(255,255,255,.03);color:#fff;font-size:11px;gap:4px}
.player-row .p-info{display:flex;align-items:center;gap:4px;flex:1;min-width:0;overflow:hidden}
.player-row .p-name{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.host-tag{background:#f39c12;color:#000;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;flex-shrink:0}
.pos-tag{font-size:8px;padding:1px 5px;border-radius:3px;font-weight:700;flex-shrink:0}
.pos-GK{background:rgba(241,196,15,.2);color:#f1c40f}
.pos-DEF{background:rgba(46,204,113,.2);color:#2ecc71}
.pos-MID{background:rgba(52,152,219,.2);color:#3498db}
.pos-FWD{background:rgba(231,76,60,.2);color:#e74c3c}
.admin-row-btns{display:flex;gap:2px;flex-shrink:0}
.admin-row-btns button{padding:2px 5px;font-size:9px;border:none;border-radius:3px;cursor:pointer;font-weight:600;color:#fff}
.lobby-box{margin-top:8px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.05);border-radius:10px;padding:10px;width:96%;max-width:400px;flex-shrink:0}
.lobby-box h4{color:#ccc;font-size:12px;margin-bottom:6px}
.lobby-box select{width:100%;padding:9px 12px;border:1px solid rgba(255,255,255,.1);border-radius:7px;background:rgba(255,255,255,.04);color:#fff;font-size:13px;outline:none;-webkit-appearance:none}
.lobby-box select option{background:#151530}
.lobby-actions{margin-top:12px;display:flex;gap:7px;flex-wrap:wrap;justify-content:center;flex-shrink:0}
.lobby-actions .btn{padding:9px 16px;font-size:12px}
/* Lobi harita seçici */
.lobby-map-row{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;margin-top:4px}
.map-chip{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#aaa;transition:all .15s}
.map-chip.sel{border-color:#f39c12;background:rgba(243,156,18,.15);color:#f39c12}

/* ===== OYUN ===== */
#gameScreen{z-index:80;background:#1a472a;overflow:hidden}
#gameCanvas{display:block;position:absolute;top:0;left:0;width:100%;height:100%;outline:none}
#hud{position:absolute;top:0;left:50%;transform:translateX(-50%);display:flex;z-index:85;pointer-events:none;border-radius:0 0 10px 10px;overflow:hidden;box-shadow:0 2px 12px rgba(0,0,0,.5)}
.hud-score{padding:5px 18px;font-size:26px;font-weight:900;color:#fff;min-width:48px;text-align:center}
.hud-score-red{background:rgba(192,57,43,.9)}
.hud-score-blue{background:rgba(41,128,185,.9)}
.hud-center{background:rgba(0,0,0,.78);padding:4px 14px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.hud-timer{color:#fff;font-size:15px;font-weight:700}
.hud-status{color:#f39c12;font-size:8px;font-weight:700;text-transform:uppercase;margin-top:1px}
#pingDisp{position:absolute;top:6px;right:8px;color:rgba(255,255,255,.5);font-size:9px;z-index:86;pointer-events:none}

/* Joystick - dinamik */
#joyZone{position:absolute;bottom:10px;left:10px;width:140px;height:140px;z-index:86;touch-action:none;pointer-events:auto}
#joyBase{position:absolute;width:110px;height:110px;border-radius:50%;background:rgba(255,255,255,.06);border:2px solid rgba(255,255,255,.12);pointer-events:none;z-index:87;opacity:0;display:none}
#joyThumb{position:absolute;width:46px;height:46px;border-radius:50%;background:rgba(255,255,255,.22);border:2px solid rgba(255,255,255,.4);pointer-events:none;z-index:88;opacity:0;display:none;transform:translate(-50%,-50%)}

/* Aksiyon butonları */
.action-btns{position:absolute;bottom:12px;right:12px;z-index:86;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:auto}
.act-btn{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;touch-action:none;pointer-events:auto;border:3px solid rgba(255,255,255,.25);transition:opacity .1s}
.act-btn.dim{opacity:.45}
.act-btn.lit{opacity:.9;transform:scale(1.06)}
#btnKick{width:70px;height:70px;background:rgba(255,255,255,.1);color:rgba(255,255,255,.85);font-size:10px}
#btnPass{width:56px;height:56px;background:rgba(46,204,113,.12);border-color:rgba(46,204,113,.3);color:rgba(46,204,113,.9);font-size:9px;position:relative;overflow:hidden}
#btnPass .pass-bar{position:absolute;bottom:0;left:0;height:4px;background:rgba(46,204,113,.7);width:100%;transform-origin:left;transition:none}
#btnPass .pass-txt{position:relative;z-index:1;font-size:9px;font-weight:700;line-height:1;text-align:center}
#btnPower{width:56px;height:56px;background:rgba(231,76,60,.12);border-color:rgba(231,76,60,.3);color:rgba(231,76,60,.9);font-size:9px;position:relative}
#btnPower .cd-ov{position:absolute;top:0;left:0;width:100%;height:100%;border-radius:50%;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;font-size:11px;color:#fff;font-weight:700}
#btnPower.ready .cd-ov{display:none}

/* Emoji & chat */
#emojiBar{position:absolute;top:42px;left:50%;transform:translateX(-50%);z-index:88;display:flex;gap:4px;pointer-events:auto;opacity:.55}
.emoji-btn{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;touch-action:none}
#chatToggle{width:30px;height:30px;border-radius:50%;background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;touch-action:none}
#chatPanel{position:absolute;top:76px;left:50%;transform:translateX(-50%);z-index:89;display:none;flex-direction:column;gap:3px;pointer-events:auto;background:rgba(0,0,0,.85);border-radius:8px;padding:6px;min-width:150px;border:1px solid rgba(255,255,255,.06)}
#chatPanel .cm{padding:6px 10px;background:rgba(255,255,255,.05);border:none;border-radius:5px;color:#fff;font-size:11px;cursor:pointer;text-align:left}
#chatLog{position:absolute;bottom:165px;left:10px;z-index:87;pointer-events:none;max-width:210px}
.ce{background:rgba(0,0,0,.58);color:#fff;padding:2px 8px;border-radius:5px;font-size:10px;margin-bottom:2px;animation:cf 4s forwards;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
@keyframes cf{0%{opacity:1}70%{opacity:1}100%{opacity:0}}

/* Admin panel - scroll çalışır */
#adminPanelGame{position:absolute;top:42px;right:6px;z-index:92;display:none;pointer-events:auto}
#adminToggleBtn{background:rgba(243,156,18,.85);color:#000;border:none;padding:6px 11px;border-radius:7px;font-weight:700;font-size:10px;cursor:pointer}
#adminMenuContent{display:none;background:rgba(5,5,20,.96);border-radius:10px;padding:8px;margin-top:4px;width:220px;border:1px solid rgba(255,255,255,.08);max-height:60vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
#adminMenuContent .sec{color:#888;font-size:9px;padding:5px 6px 2px;text-transform:uppercase;border-bottom:1px solid rgba(255,255,255,.04);margin-bottom:4px}
#adminMenuContent button{display:block;width:100%;padding:9px 10px;margin-bottom:4px;border:none;border-radius:5px;font-size:11px;font-weight:600;cursor:pointer;color:#fff;text-align:left}
#adminMenuContent select{width:100%;padding:7px 10px;margin-bottom:5px;border:1px solid rgba(255,255,255,.12);border-radius:5px;background:rgba(255,255,255,.05);color:#fff;font-size:11px;outline:none;-webkit-appearance:none}
#adminMenuContent select option{background:#0a0a1a}
.apr{display:flex;align-items:center;gap:3px;margin-bottom:4px;padding:4px 6px;background:rgba(255,255,255,.03);border-radius:5px;flex-wrap:wrap}
.apr .an{color:#ccc;font-size:10px;flex:1;min-width:50px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.apr button{padding:3px 6px;font-size:9px;border:none;border-radius:3px;cursor:pointer;font-weight:600;color:#fff}

/* Gol overlay */
#goalOverlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;flex-direction:column;align-items:center;justify-content:center;z-index:89;pointer-events:none;background:rgba(0,0,0,.25)}
.goal-text{font-size:52px;font-weight:900;color:#fff;text-shadow:0 0 40px rgba(255,255,255,.4);animation:ga .4s cubic-bezier(.175,.885,.32,1.275)}
.goal-scorer{font-size:14px;color:rgba(255,255,255,.85);margin-top:6px;text-shadow:0 1px 4px rgba(0,0,0,.8)}
.goal-owngoal{font-size:12px;color:#f39c12;margin-top:2px}
@keyframes ga{0%{transform:scale(.15);opacity:0}70%{transform:scale(1.1)}100%{transform:scale(1);opacity:1}}

/* Maç sonu - istatistik ekranı */
#winOverlay{position:absolute;top:0;left:0;width:100%;height:100%;display:none;align-items:center;justify-content:center;flex-direction:column;z-index:95;pointer-events:auto;background:rgba(0,0,0,.9);overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}
#winOverlay h1{font-size:36px;font-weight:900;margin-bottom:6px;text-align:center}
#winOverlay .win-score{font-size:28px;font-weight:900;color:#fff;margin-bottom:14px}
.stats-box{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:12px;width:100%;max-width:360px;margin-bottom:12px}
.stats-box h3{color:#aaa;font-size:11px;text-transform:uppercase;margin-bottom:8px;text-align:center;letter-spacing:.5px}
.stat-row{display:flex;align-items:center;justify-content:space-between;padding:5px 8px;border-radius:6px;background:rgba(255,255,255,.03);margin-bottom:3px;font-size:12px;color:#fff}
.stat-name{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.stat-team-dot{width:8px;height:8px;border-radius:50%;margin-right:5px;flex-shrink:0}
.stat-goals{font-weight:700;color:#f1c40f;min-width:24px;text-align:right}
.stat-assists{color:#aaa;font-size:10px;min-width:30px;text-align:right}
#winOverlay button{padding:14px 40px;border:none;border-radius:10px;font-size:15px;font-weight:700;cursor:pointer;color:#fff;background:linear-gradient(135deg,#27ae60,#1c8a4a);margin-top:4px}

#toast{position:fixed;bottom:65px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.88);color:#fff;padding:7px 18px;border-radius:18px;font-size:11px;z-index:99990;display:none;white-space:nowrap;pointer-events:none}
#connecting{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,10,.93);z-index:99998;display:flex;align-items:center;justify-content:center;flex-direction:column;color:#fff;gap:12px}
#connecting p{font-size:14px;color:#aaa}
.hidden{display:none!important}
</style>
</head>
<body>
<div id="rotateMsg"><div style="font-size:40px">📱➡️</div><p>Lütfen telefonu <b>yatay</b> çevirin</p></div>
<div id="connecting"><div style="font-size:32px">⚡</div><p id="connectingMsg">Sunucuya bağlanılıyor...</p></div>

<!-- MENÜ -->
<div id="menuScreen" class="screen" style="display:flex">
  <h1>⚽ HaxBall Mobile</h1>
  <p class="sub">MULTIPLAYER FUTBOL</p>
  <div class="mbox">
    <input type="text" id="inpName" placeholder="Oyuncu Adın" maxlength="12" autocomplete="off" autocorrect="off" spellcheck="false">
    <div class="divider">YENİ ODA</div>
    <input type="text" id="inpPwd" placeholder="Şifre (opsiyonel)" maxlength="20" autocomplete="off">
    <button class="btn btn-full btn-red" id="btnCreate">🏟️ Oda Kur</button>
    <div class="divider">KATIL</div>
    <input type="text" id="inpCode" placeholder="Oda Kodu" maxlength="6" style="text-transform:uppercase" autocomplete="off" autocorrect="off">
    <input type="text" id="inpJP" placeholder="Şifre" maxlength="20" autocomplete="off">
    <button class="btn btn-full btn-blue" id="btnJoin">🚀 Katıl</button>
  </div>
</div>

<!-- LOBİ -->
<div id="lobbyScreen" class="screen">
  <h2>🏟️ Lobi</h2>
  <div class="room-code-box" id="lobbyCode">---</div>
  <div class="lobby-map-info" id="lobbyMapName"></div>

  <!-- Harita seçici - sadece host görür -->
  <div class="lobby-box" id="lobbyMapBox" style="display:none">
    <h4>🗺️ Harita Seç</h4>
    <div class="lobby-map-row" id="lobbyMapChips"></div>
  </div>

  <div class="lobby-teams">
    <div class="team-panel t-red"><h3>🔴 Kırmızı</h3><div id="lRL"></div></div>
    <div class="team-panel t-spec"><h3>👁️ İzleyici</h3><div id="lSL"></div></div>
    <div class="team-panel t-blue"><h3>🔵 Mavi</h3><div id="lBL"></div></div>
  </div>

  <div class="lobby-box" id="lobbyPB" style="display:none">
    <h4>🎽 Mevki Seç</h4>
    <select id="lobbyPS">
      <option value="">-- Seç --</option>
      <option value="GK">🧤 Kaleci</option>
      <option value="DEF">🛡️ Defans</option>
      <option value="MID">🎯 Orta Saha</option>
      <option value="FWD">⚡ Forvet</option>
    </select>
  </div>

  <div class="lobby-box" id="lobbyGLBox" style="display:none">
    <h4>⚽ Gol Sınırı</h4>
    <select id="lobbyGLS">
      <option value="1">1 Gol</option>
      <option value="3">3 Gol</option>
      <option value="5" selected>5 Gol</option>
      <option value="10">10 Gol</option>
      <option value="20">20 Gol</option>
      <option value="0">Sınırsız</option>
    </select>
  </div>

  <div class="lobby-actions">
    <button class="btn btn-red btn-small" id="btnTR">🔴 Kırmızı</button>
    <button class="btn btn-gray btn-small" id="btnTS">👁️ İzleyici</button>
    <button class="btn btn-blue btn-small" id="btnTB">🔵 Mavi</button>
    <button class="btn btn-green btn-small hidden" id="btnSt">🚀 Başlat</button>
    <button class="btn btn-small" id="btnLv" style="background:#7a2e2e;color:#fff">🚪 Ayrıl</button>
  </div>
</div>

<!-- OYUN -->
<div id="gameScreen" class="screen">
  <canvas id="gameCanvas" tabindex="0"></canvas>
  <div id="hud">
    <div class="hud-score hud-score-red" id="hudR">0</div>
    <div class="hud-center">
      <div class="hud-timer" id="hudT">0:00</div>
      <div class="hud-status" id="hudS"></div>
    </div>
    <div class="hud-score hud-score-blue" id="hudB">0</div>
  </div>
  <div id="pingDisp">-- ms</div>
  <div id="joyZone"></div>
  <div id="joyBase"></div>
  <div id="joyThumb"></div>
  <div class="action-btns">
    <div class="act-btn dim" id="btnPower"><span>🔥</span><div class="cd-ov" id="pwCD">45</div></div>
    <div class="act-btn dim" id="btnKick">VURUŞ</div>
    <div class="act-btn dim" id="btnPass">
      <div class="pass-bar" id="passBar" style="transform:scaleX(1)"></div>
      <div class="pass-txt" id="passTxt">PAS</div>
    </div>
  </div>
  <div id="emojiBar">
    <div class="emoji-btn" data-e="😭">😭</div>
    <div class="emoji-btn" data-e="😂">😂</div>
    <div class="emoji-btn" data-e="👏">👏</div>
    <div class="emoji-btn" data-e="😠">😠</div>
    <div id="chatToggle">💬</div>
  </div>
  <div id="chatPanel">
    <button class="cm" data-m="Başarılar">Başarılar</button>
    <button class="cm" data-m="GG">GG</button>
    <button class="cm" data-m="Tebrik ederim">Tebrik ederim</button>
    <button class="cm" data-m="Ağlama oyna">Ağlama oyna</button>
    <button class="cm" data-m="Ya sabır">Ya sabır</button>
  </div>
  <div id="chatLog"></div>
  <div id="adminPanelGame">
    <button id="adminToggleBtn">⚙️ ADMİN</button>
    <div id="adminMenuContent"></div>
  </div>
  <div id="goalOverlay">
    <div class="goal-text" id="goalText">GOL!</div>
    <div class="goal-scorer" id="goalScorer"></div>
    <div class="goal-owngoal" id="goalOwn"></div>
  </div>
  <div id="winOverlay">
    <h1 id="winText">🏆</h1>
    <div class="win-score" id="winScore"></div>
    <div class="stats-box" id="statsBox">
      <h3>📊 Maç İstatistikleri</h3>
      <div id="statsContent"></div>
    </div>
    <button id="winBtn">Lobiye Dön</button>
  </div>
</div>

<div id="toast"></div>

<script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
<script>
(function(){
'use strict';

const SERVER_URL = 'haxball-server-production.up.railway.app';

const MAPS = {
    classic:{name:'Klasik',fw:1200,fh:600,gh:150,gd:55,bg:'#2b7530',f1:'#3a8c3a',f2:'#358535',lc:'rgba(255,255,255,.5)',cr:85,pw:130,ph:270},

function toast(m,d){ d=d||2000; var t=$('toast'); t.textContent=m; t.style.display='block'; clearTimeout(t._t); t._t=setTimeout(function(){ t.style.display='none'; },d); }
function lerp(a,b,t){ return a+(b-a)*t; }
function dst(x1,y1,x2,y2){ var dx=x2-x1,dy=y2-y1; return Math.sqrt(dx*dx+dy*dy); }

function showScr(n){
    $('menuScreen').style.display='none';
    $('lobbyScreen').style.display='none';
    $('gameScreen').style.display='none';
    gameState=n;
    if(n==='menu'){$('menuScreen').style.display='flex'; stopL();}
    else if(n==='lobby'){$('lobbyScreen').style.display='flex'; stopL();}
    else if(n==='game'){$('gameScreen').style.display='block'; resC(); startL(); setTimeout(function(){ canvas.focus(); },80);}
}
function resC(){
    cW=window.innerWidth; cH=window.innerHeight;
    canvas.width=cW; canvas.height=cH;
    var tw=cm.fw+FM*2, th=cm.fh+FM*2;
    vS=Math.min(cW/tw,cH/th);
    vOX=(cW-tw*vS)/2; vOY=(cH-th*vS)/2;
}
window.addEventListener('resize',function(){ if(gameState==='game') resC(); });

// ---- SOCKET ----
function connectSocket(){
    $('connecting').style.display='flex';
    $('connectingMsg').textContent='Sunucuya bağlanılıyor...';
    socket=io(SERVER_URL,{
        transports:['polling','websocket'],
        reconnection:true, reconnectionDelay:2000, reconnectionAttempts:20, timeout:20000
    });
    socket.on('connect',function(){
        myId=socket.id;
        $('connecting').style.display='none';
        setInterval(function(){ lastPingTime=Date.now(); socket.emit('ping_custom'); },3000);
    });
    socket.on('pong_custom',function(){
        pingMs=Date.now()-lastPingTime;
        $('pingDisp').textContent=pingMs+'ms';
        $('pingDisp').style.color=pingMs<80?'#2ecc71':pingMs<150?'#f39c12':'#e74c3c';
    });
    socket.on('disconnect',function(){
        $('connecting').style.display='flex';
        $('connectingMsg').textContent='Bağlantı kesildi, yeniden bağlanılıyor...';
    });
    socket.on('reconnect',function(){ $('connecting').style.display='none'; toast('Yeniden bağlandı!'); });
    socket.on('connect_error',function(){ $('connectingMsg').textContent='Sunucuya ulaşılamıyor...'; });

    // -- LOBİ EVENTS --
    socket.on('lobbyUpdate',function(data){
        lobbyData=data;
        hostId=data.hostId;
        isHost=(myId===hostId);
        cmk=data.mapKey||'classic';
        cm=MAPS[cmk]||MAPS.classic;
        gLim=data.goalLimit||5;
        if(gameState==='lobby') refLobby();
    });
    socket.on('goalLimitChanged',function(data){
        gLim=data.goalLimit||0;
        if($('lobbyGLS')) $('lobbyGLS').value=String(gLim);
        toast(gLim?'Gol sınırı: '+gLim+' Gol':'Sınırsız mod');
    });
    socket.on('newHost',function(data){
        hostId=data.hostId; isHost=(myId===hostId);
        if(gameState==='lobby') refLobby();
        if(gameState==='game') $('adminPanelGame').style.display=isHost?'block':'none';
        if(isHost) toast('Sen host oldun!');
    });
    socket.on('kicked',function(){ toast('Odadan atıldın!'); cleanup(); showScr('menu'); });
    socket.on('backToLobby',function(){
        stopL(); gF=false; P={};
        B={x:cm.fw/2,y:cm.fh/2,vx:0,vy:0,fire:false,tx:cm.fw/2,ty:cm.fh/2};
        $('winOverlay').style.display='none';
        $('goalOverlay').style.display='none';
        showScr('lobby');
    });

    // -- OYUN EVENTS --
    socket.on('gameStart',function(data){
        cmk=data.mapKey||'classic';
        cm=MAPS[cmk]||MAPS.classic;
        gLim=data.goalLimit||5;
        initGame(data);
        showScr('game');
    });
    socket.on('state',function(data){ applyState(data); });
    socket.on('goal',function(data){
        rS=data.redScore; bS=data.blueScore;
        var scorerPid=data.scorerPid||null;
        var assistPid=data.assistPid||null;
        var isOwn=data.ownGoal||false;
        // Gol overlay
        if(data.team==='red'){
            $('goalText').textContent='🔴 GOL!'; $('goalText').style.color='#e74c3c';
        } else {
            $('goalText').textContent='🔵 GOL!'; $('goalText').style.color='#3498db';
        }
        // Golcü ismi
        var sn=''; var an='';
        if(scorerPid&&P[scorerPid]) sn=P[scorerPid].name;
        if(assistPid&&P[assistPid]) an=P[assistPid].name;
        $('goalScorer').textContent = sn ? '⚽ '+sn : '';
        $('goalOwn').textContent = isOwn ? '(Kendi Kalesine!)' : (an ? '🎯 Asist: '+an : '');
        $('goalOverlay').style.display='flex';
        gF=true;
        // Yerel istatistik güncelle
        if(scorerPid){
            if(!matchStats[scorerPid]) matchStats[scorerPid]={name:(P[scorerPid]?P[scorerPid].name:'?'),team:(P[scorerPid]?P[scorerPid].team:''),goals:0,ownGoals:0,assists:0};
            if(isOwn) matchStats[scorerPid].ownGoals++;
            else matchStats[scorerPid].goals++;
        }
        if(assistPid&&assistPid!==scorerPid){
            if(!matchStats[assistPid]) matchStats[assistPid]={name:(P[assistPid]?P[assistPid].name:'?'),team:(P[assistPid]?P[assistPid].team:''),goals:0,ownGoals:0,assists:0};
            matchStats[assistPid].assists++;
        }
    });
    socket.on('resetPositions',function(data){
        gF=false; $('goalOverlay').style.display='none';
        if(data) applyState(data);
    });
    socket.on('matchEnd',function(data){
        mR=false;
        $('goalOverlay').style.display='none';
        var winner=data.winner||(data.redScore>data.blueScore?'red':(data.blueScore>data.redScore?'blue':'draw'));
        if(winner==='draw'){
            $('winText').textContent='🤝 BERABERE!'; $('winText').style.color='#f39c12';
        } else {
            $('winText').textContent='🏆 '+(winner==='red'?'🔴 KIRMIZI':'🔵 MAVİ')+' KAZANDI!';
            $('winText').style.color=winner==='red'?'#e74c3c':'#3498db';
        }
        $('winScore').textContent=(data.redScore||rS)+' - '+(data.blueScore||bS);
        // Sunucudan istatistik gelirse güncelle
        if(data.stats) mergeStats(data.stats);
        renderStats();
        $('winOverlay').style.display='flex';
    });
    socket.on('paused',function(p){ mP=p; toast(p?'Duraklatıldı':'Devam ediyor'); });
    socket.on('adminReset',function(data){
        rS=0; bS=0; mT=0; gF=false;
        matchStats={};
        $('goalOverlay').style.display='none';
        if(data) applyState(data);
    });
    socket.on('mapChanged',function(data){
        cmk=data.mapKey; cm=MAPS[cmk]||MAPS.classic; resC();
        if(data.state) applyState(data.state);
    });
    socket.on('powerShot',function(data){
        if(data.pid===myId) pwCD=2700;
    });
    socket.on('chat',function(data){
        addChat(data.name,data.msg);
        if(data.pid&&P[data.pid]) pBubs[data.pid]={text:data.msg,timer:180};
    });
    socket.on('emoji',function(data){
        if(data.pid) pBubs[data.pid]={text:data.emoji,timer:150};
    });
}

// ---- STATE UYGULA ----
function applyState(data){
    if(!data) return;
    if(data.match){
        mT=data.match.time||0;
        mR=data.match.running||false;
        mP=data.match.paused||false;
        rS=data.match.redScore||0;
        bS=data.match.blueScore||0;
    }
    if(data.goalFreeze!==undefined) gF=data.goalFreeze;
    if(data.ball){
        var tb=data.ball;
        B.tx=tb.x; B.ty=tb.y;
        B.vx=tb.vx||0; B.vy=tb.vy||0;
        B.fire=tb.fire||false;
        if(!B.init||dst(B.x,B.y,tb.x,tb.y)>200){ B.x=tb.x; B.y=tb.y; B.init=true; }
    }
    if(data.players){
        for(var pid in data.players){
            var rd=data.players[pid];
            if(!P[pid]){
                P[pid]={name:rd.name,team:rd.team,pos:rd.pos||'',x:rd.x||0,y:rd.y||0,vx:rd.vx||0,vy:rd.vy||0,kick:rd.kick||false,pCD:rd.pCD||0,tx:rd.x||0,ty:rd.y||0,init:true};
                // İstatistik girişi oluştur
                if(!matchStats[pid]) matchStats[pid]={name:rd.name,team:rd.team,goals:0,ownGoals:0,assists:0};
                continue;
            }
            var p=P[pid];
            p.team=rd.team; p.name=rd.name; p.pos=rd.pos||'';
            p.kick=rd.kick||false; p.pCD=rd.pCD||0;
            p.vx=rd.vx||0; p.vy=rd.vy||0;
            p.tx=rd.x; p.ty=rd.y;
            if(!p.init||dst(p.x,p.y,rd.x,rd.y)>200){ p.x=rd.x; p.y=rd.y; p.init=true; }
            if(pid===myId&&rd.pCD>pwCD) pwCD=rd.pCD;
        }
        for(var pid2 in P){ if(!data.players[pid2]) delete P[pid2]; }
    }
    // Topa kim dokunuyor - assist takibi
    trackToucher();
}

function trackToucher(){
    // Topa en yakın oyuncuyu bul
    var best=null, bd=PR+BR+8;
    for(var pid in P){
        var p=P[pid]; if(p.team==='spectator') continue;
        var d=dst(p.x,p.y,B.x||B.tx||0,B.y||B.ty||0);
        if(d<bd){ bd=d; best=pid; }
    }
    if(best) lastToucher=best;
}

function mergeStats(srv){
    for(var pid in srv){
        if(!matchStats[pid]) matchStats[pid]={name:srv[pid].name,team:srv[pid].team,goals:0,ownGoals:0,assists:0};
        matchStats[pid].goals=srv[pid].goals||0;
        matchStats[pid].ownGoals=srv[pid].ownGoals||0;
        matchStats[pid].assists=srv[pid].assists||0;
        matchStats[pid].name=srv[pid].name||matchStats[pid].name;
        matchStats[pid].team=srv[pid].team||matchStats[pid].team;
    }
}

function renderStats(){
    var sc=$('statsContent');
    sc.innerHTML='';
    // Gol atan oyuncuları sırala
    var arr=[];
    for(var pid in matchStats){
        var s=matchStats[pid];
        if(s.goals>0||s.ownGoals>0||s.assists>0) arr.push(s);
    }
    if(arr.length===0){ sc.innerHTML='<div style="color:#666;font-size:11px;text-align:center;padding:8px">İstatistik yok</div>'; return; }
    arr.sort(function(a,b){ return (b.goals+b.assists)-(a.goals+a.assists); });
    for(var i=0;i<arr.length;i++){
        var s=arr[i];
        var row=document.createElement('div'); row.className='stat-row';
        var dot='<span class="stat-team-dot" style="background:'+(s.team==='red'?'#e74c3c':'#3498db')+'"></span>';
        var extra='';
        if(s.ownGoals>0) extra+=' <span style="color:#e67e22;font-size:9px">('+s.ownGoals+' kk)</span>';
        row.innerHTML=dot+'<span class="stat-name">'+escHtml(s.name)+extra+'</span>'
            +'<span class="stat-goals">⚽ '+s.goals+'</span>'
            +'<span class="stat-assists">🎯 '+s.assists+'</span>';
        sc.appendChild(row);
    }
}
function escHtml(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function buildMapChips(){
    var c=$('lobbyMapChips');
    c.innerHTML='';
    for(var mk in MAPS){
        var chip=document.createElement('div');
        chip.className='map-chip'+(mk===cmk?' sel':'');
        chip.textContent=MAPS[mk].name;
        chip.setAttribute('data-mk',mk);
        c.appendChild(chip);
    }
    // Tıklama
    c.querySelectorAll('.map-chip').forEach(function(ch){
        ch.addEventListener('click',function(){
            var nk=ch.getAttribute('data-mk');
            if(socket) socket.emit('adminChangeMap',{mapKey:nk});
        });
        ch.addEventListener('touchstart',function(e){
            e.stopPropagation();
            var nk=ch.getAttribute('data-mk');
            if(socket) socket.emit('adminChangeMap',{mapKey:nk});
        },{passive:true});
    });
}

function refLobby(){
    if(!lobbyData||!lobbyData.players) return;
    var rD=$('lRL'), bD=$('lBL'), sD=$('lSL');
    rD.innerHTML=''; bD.innerHTML=''; sD.innerHTML='';
    var pl={GK:'KAL',DEF:'DEF',MID:'ORS',FWD:'FRV'};
    for(var pid in lobbyData.players){
        var p=lobbyData.players[pid];
        var r=document.createElement('div'); r.className='player-row';
        var hH=pid===lobbyData.hostId?'<span class="host-tag">HOST</span>':'';
        var posH='';
        if(p.pos&&p.team!=='spectator') posH='<span class="pos-tag pos-'+p.pos+'">'+(pl[p.pos]||p.pos)+'</span>';
        var aH='';
        if(isHost&&pid!==myId){
            aH='<div class="admin-row-btns">'
                +'<button style="background:#e74c3c" data-ap="'+pid+'" data-at="red">K</button>'
                +'<button style="background:#3498db" data-ap="'+pid+'" data-at="blue">M</button>'
                +'<button style="background:#555" data-ap="'+pid+'" data-at="spectator">İ</button>'
                +'<button style="background:#7a2e2e" data-lk="'+pid+'">🚫</button>'
                +'</div>';
        }
        r.innerHTML='<span class="p-info">'+hH+'<span class="p-name">'+(p.name||'?')+'</span>'+posH+'</span>'+aH;
        if(p.team==='red') rD.appendChild(r);
        else if(p.team==='blue') bD.appendChild(r);
        else sD.appendChild(r);
    }
    document.querySelectorAll('[data-ap]').forEach(function(b){
        b.onclick=function(){ socket.emit('adminChangeTeam',{pid:b.getAttribute('data-ap'),team:b.getAttribute('data-at')}); };
    });
    document.querySelectorAll('[data-lk]').forEach(function(b){
        b.onclick=function(){ if(socket) socket.emit('adminKick',{pid:b.getAttribute('data-lk')}); };
    });
    $('btnSt').classList.toggle('hidden',!isHost);
    $('lobbyMapName').textContent='🗺️ '+( cm.name||cmk );
    // Harita seçici - sadece host
    if(isHost){
        $('lobbyMapBox').style.display='block';
        buildMapChips();
    } else {
        $('lobbyMapBox').style.display='none';
    }
    // Mevki seç
    var me=lobbyData.players[myId];
    if(!me||me.team==='spectator'){
        $('lobbyPB').style.display='none';
    } else {
        $('lobbyPB').style.display='block';
        var sel=$('lobbyPS');
        var pos=['GK','DEF','MID','FWD'];
        var lab={GK:'🧤 Kaleci',DEF:'🛡️ Defans',MID:'🎯 Orta Saha',FWD:'⚡ Forvet'};
        var h='<option value="">-- Seç --</option>';
        for(var i=0;i<pos.length;i++){
            h+='<option value="'+pos[i]+'"'+(me.pos===pos[i]?' selected':'')+'>'+lab[pos[i]]+'</option>';
        }
        sel.innerHTML=h;
    }
    // Gol sınırı - sadece host
    if(isHost){
        $('lobbyGLBox').style.display='block';
        $('lobbyGLS').value=String(gLim);
    } else {
        $('lobbyGLBox').style.display='none';
    }
}

function initGame(data){
    P={};

    mT=0; mR=true; mP=false; gF=false; rS=0; bS=0;
    pwCD=0; passCD=0; passTouched=false; kH=false; pH=false; pwP=false;
    matchStats={}; lastToucher=null;
    fireParts=[]; pBubs={}; chatEnts=[];
    $('adminPanelGame').style.display=isHost?'block':'none';
    admO=false; $('adminMenuContent').style.display='none';
    $('goalOverlay').style.display='none';
    $('winOverlay').style.display='none';
    buildAdm();
    if(data.players){
        for(var pid in data.players){
            var p=data.players[pid];
            P[pid]={
                name:p.name, team:p.team, pos:p.pos||'',
                x:p.x||cm.fw/2, y:p.y||cm.fh/2,
                vx:0, vy:0, kick:false, pCD:0,
                tx:p.x||cm.fw/2, ty:p.y||cm.fh/2, init:true
            };
            matchStats[pid]={name:p.name,team:p.team,goals:0,ownGoals:0,assists:0};
        }
    }
}

// ---- CLEANUP ----
function cleanup(){

    fireParts=[]; pBubs=[]; chatEnts=[]; gF=false; matchStats={}; lastToucher=null;
}

// ---- OYUN DÖNGÜSÜ ----
function startL(){
    if(animId) cancelAnimationFrame(animId);
    lastFT=performance.now(); acm=0;
    tick(lastFT);
}
function stopL(){
    if(animId){ cancelAnimationFrame(animId); animId=null; }
}
function tick(now){
    animId=requestAnimationFrame(tick);
    var dt=now-lastFT; lastFT=now;
    if(dt>100) dt=100;
    acm+=dt;
    while(acm>=FDT){ gameUpdate(FDT); acm-=FDT; }
    render();
    if(now-lastInputSend>=INPUT_INTERVAL&&socket&&socket.connected){
        lastInputSend=now;
        socket.emit('input',{
            dx:+(myIn.dx.toFixed(2)),
            dy:+(myIn.dy.toFixed(2)),
            ik:kH, ip:pH, ipw:pwP
        });
        if(pwP) pwP=false;
    }
}

// ---- OYUN GÜNCELLEMESİ ----
function gameUpdate(dt){
    var bf=MAPS[cmk]?MAPS[cmk].bf||.987:.987;
    // Oyuncu interpolasyon
    for(var pid in P){
        var p=P[pid];
        if(p.tx==null) continue;
        var dd=dst(p.x,p.y,p.tx,p.ty);
        if(dd>100){ p.x=p.tx; p.y=p.ty; }
        else if(dd>0.3){ p.x=lerp(p.x,p.tx,.5); p.y=lerp(p.y,p.ty,.5); }
    }
    // Top interpolasyon
    if(B.tx!=null){
        var bdd=dst(B.x,B.y,B.tx,B.ty);
        if(bdd>100){ B.x=B.tx; B.y=B.ty; }
        else if(bdd>0.3){ B.x=lerp(B.x,B.tx,.5); B.y=lerp(B.y,B.ty,.5); }
        if(Math.sqrt(B.vx*B.vx+B.vy*B.vy)>1){
            B.x+=B.vx*.1; B.y+=B.vy*.1;
            B.vx*=bf; B.vy*=bf;
        }
    }
    // Power CD
    if(pwCD>0) pwCD--;
    var cdEl=$('pwCD');
    cdEl.style.display=pwCD>0?'flex':'none';
    if(pwCD>0) cdEl.textContent=Math.ceil(pwCD/60);
    $('btnPower').classList.toggle('ready',pwCD<=0);

    // Pas CD - sadece topa gerçekten dokunduğunda sayar
    if(passCD>0){
        passCD--;
        var bar=$('passBar');
        bar.style.transform='scaleX('+(passCD/PASS_CD_TICKS)+')';
        $('btnPass').classList.add('dim');
        $('btnPass').classList.remove('lit');
        // Kalan süreyi buton üzerinde göster
        var sLeft=Math.ceil(passCD/60);
        $('passTxt').textContent=sLeft>0?sLeft+'s':'PAS';
    } else {
        $('passBar').style.transform='scaleX(1)';
        $('passTxt').textContent='PAS';
        if(pH){
            $('btnPass').classList.remove('dim');
            $('btnPass').classList.add('lit');
        } else {
            $('btnPass').classList.add('dim');
            $('btnPass').classList.remove('lit');
        }
    }

    // Pas: topa temas edip vuruş yapılınca cooldown başlar
    // passTouched sıfırlama - kH bırakılınca reset
    if(!kH) passTouched=false;

    // Fire partiküller
    for(var fi=fireParts.length-1;fi>=0;fi--){
        var fp=fireParts[fi];
        fp.x+=fp.vx; fp.y+=fp.vy; fp.life--; fp.sz*=.93;
        if(fp.life<=0) fireParts.splice(fi,1);
    }
    if(B.fire&&fireParts.length<20){
        fireParts.push({x:B.x,y:B.y,vx:-B.vx*.08+(Math.random()-.5)*1.5,vy:-B.vy*.08+(Math.random()-.5)*1.5,life:15,sz:3+Math.random()*3,c:Math.random()>.5?'#ff6600':'#ffcc00'});
    }
    // Bubble timer
    for(var bp in pBubs){ pBubs[bp].timer--; if(pBubs[bp].timer<=0) delete pBubs[bp]; }
    for(var ci=chatEnts.length-1;ci>=0;ci--){ chatEnts[ci].timer--; if(chatEnts[ci].timer<=0) chatEnts.splice(ci,1); }
}

// ---- RENDER ----
function render(){
    ctx.clearRect(0,0,cW,cH);
    ctx.fillStyle=cm.bg; ctx.fillRect(0,0,cW,cH);
    ctx.save();
    ctx.translate(vOX,vOY); ctx.scale(vS,vS); ctx.translate(FM,FM);
    drawField(); drawFire(); drawBall(); drawPlayers();
    ctx.restore();
    updateHUD();
}

function drawField(){
    var FW=cm.fw, FH=cm.fh, GH=cm.gh, GD=cm.gd;
    var gT=FH/2-GH/2, gB=FH/2+GH/2, lc=cm.lc;
    ctx.fillStyle=cm.f1; ctx.fillRect(0,0,FW,FH);
    ctx.fillStyle=cm.f2; var sw=FW/10;
    for(var i=0;i<10;i+=2) ctx.fillRect(i*sw,0,sw,FH);
    ctx.strokeStyle=lc; ctx.lineWidth=3;
    ctx.strokeRect(2,2,FW-4,FH-4);
    ctx.beginPath(); ctx.moveTo(FW/2,0); ctx.lineTo(FW/2,FH); ctx.stroke();
    ctx.beginPath(); ctx.arc(FW/2,FH/2,cm.cr,0,Math.PI*2); ctx.stroke();
    ctx.fillStyle=lc; ctx.beginPath(); ctx.arc(FW/2,FH/2,4,0,Math.PI*2); ctx.fill();
    ctx.lineWidth=2;
    ctx.strokeRect(0,FH/2-cm.ph/2,cm.pw,cm.ph);
    ctx.strokeRect(FW-cm.pw,FH/2-cm.ph/2,cm.pw,cm.ph);
    ctx.fillStyle='rgba(231,76,60,.06)'; ctx.fillRect(-GD,gT,GD,GH);
    ctx.strokeStyle='rgba(231,76,60,.65)'; ctx.lineWidth=3;
    ctx.beginPath(); ctx.moveTo(0,gT); ctx.lineTo(-GD,gT); ctx.lineTo(-GD,gB); ctx.lineTo(0,gB); ctx.stroke();
    ctx.fillStyle='rgba(52,152,219,.06)'; ctx.fillRect(FW,gT,GD,GH);
    ctx.strokeStyle='rgba(52,152,219,.65)';
    ctx.beginPath(); ctx.moveTo(FW,gT); ctx.lineTo(FW+GD,gT); ctx.lineTo(FW+GD,gB); ctx.lineTo(FW,gB); ctx.stroke();
    ctx.fillStyle='#ddd';
    [[0,gT],[0,gB],[FW,gT],[FW,gB]].forEach(function(pp){
        ctx.beginPath(); ctx.arc(pp[0],pp[1],PSR,0,Math.PI*2); ctx.fill();
    });
}

function drawFire(){
    if(!fireParts.length) return;
    for(var i=0;i<fireParts.length;i++){
        var fp=fireParts[i];
        ctx.globalAlpha=fp.life/15; ctx.fillStyle=fp.c;
        ctx.fillRect(fp.x-fp.sz/2,fp.y-fp.sz/2,fp.sz,fp.sz);
    }
    ctx.globalAlpha=1;
}

function drawBall(){
    ctx.fillStyle='rgba(0,0,0,.15)';
    ctx.beginPath(); ctx.arc(B.x+2,B.y+3,BR,0,Math.PI*2); ctx.fill();
    if(B.fire){
        ctx.fillStyle='rgba(255,100,0,.22)';
        ctx.beginPath(); ctx.arc(B.x,B.y,BR*1.7,0,Math.PI*2); ctx.fill();
    }
    ctx.fillStyle=B.fire?'#ffaa00':'#fff';
    ctx.beginPath(); ctx.arc(B.x,B.y,BR,0,Math.PI*2); ctx.fill();
    ctx.strokeStyle=B.fire?'#ff4400':'#999'; ctx.lineWidth=1.5;
    ctx.beginPath(); ctx.arc(B.x,B.y,BR,0,Math.PI*2); ctx.stroke();
}

function drawPlayers(){
    var psl={GK:'GK',DEF:'DF',MID:'MF',FWD:'FW'};
    var sz=PR*2+6;
    for(var pid in P){
        var p=P[pid]; if(p.team==='spectator') continue;
        var isMe=(pid===myId);
        if(p.kick){
            ctx.strokeStyle=p.team==='red'?'rgba(255,80,80,.35)':'rgba(80,160,255,.35)';
            ctx.lineWidth=1.5;
            ctx.beginPath(); ctx.arc(p.x,p.y,PR+BR+2,0,Math.PI*2); ctx.stroke();
        }
        ctx.drawImage(p.team==='red'?redImg:blueImg,p.x-sz/2,p.y-sz/2);
        if(isMe){
            ctx.strokeStyle='rgba(255,255,255,.9)'; ctx.lineWidth=2;
            ctx.beginPath(); ctx.arc(p.x,p.y,PR+1,0,Math.PI*2); ctx.stroke();
        }
        if(p.pos&&psl[p.pos]){
            ctx.fillStyle='rgba(255,255,255,.65)'; ctx.font='bold 8px Arial';
            ctx.textAlign='center'; ctx.textBaseline='middle';
            ctx.fillText(psl[p.pos],p.x,p.y);
        }
        ctx.fillStyle='#fff'; ctx.font='bold 9px Arial';
        ctx.textAlign='center'; ctx.textBaseline='bottom';
        ctx.fillText(p.name||'?',p.x,p.y-PR-3);
        if(isMe){
            ctx.fillStyle='rgba(255,255,255,.5)'; ctx.font='7px Arial';
            ctx.fillText('▼',p.x,p.y-PR-12);
        }
        if(pBubs[pid]){
            ctx.font='14px Arial'; ctx.textAlign='center'; ctx.textBaseline='bottom';
            ctx.fillText(pBubs[pid].text,p.x,p.y-PR-17);
        }
    }
}

    var mc=$('adminMenuContent'); mc.innerHTML='';

    // Harita chip'leri
    var mapChipsHtml='<div style="display:flex;flex-wrap:wrap;gap:4px;margin-bottom:6px">';
    for(var mk in MAPS){
        var sel=(mk===cmk)?'border:2px solid #f39c12;background:rgba(243,156,18,.2);color:#f39c12':'border:2px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:#aaa';

    }
    mapChipsHtml+='</div>';

    mc.innerHTML=
        '<div class="sec">KONTROL</div>'
        +'<button style="background:#f39c12;color:#000" id="admP">'+(mP?'▶ Devam':'⏸ Duraklat')+'</button>'
        +'<button style="background:#e74c3c" id="admR">🔄 Sıfırla</button>'
        +'<button style="background:#3498db" id="admL">🔙 Lobiye Dön</button>'
        +'<div class="sec">HARİTA</div>'
        +mapChipsHtml
        +'<div class="sec">OYUNCULAR</div>'
        +'<div id="admPL"></div>';

    $('admP').onclick=function(){ if(socket) socket.emit('adminPause'); buildAdm(); };
    $('admR').onclick=function(){ if(socket) socket.emit('adminReset'); };
    $('admL').onclick=function(){ if(socket) socket.emit('adminLobby'); };

    // Harita chip tıklama
    mc.querySelectorAll('[data-mchip]').forEach(function(b){
        b.addEventListener('click',function(e){
            e.stopPropagation();
            var nk=b.getAttribute('data-mchip');
            if(socket) socket.emit('adminChangeMap',{mapKey:nk});
            cmk=nk; cm=MAPS[nk]||MAPS.classic;
            buildAdm(); // chip renklerini güncelle
        });
        b.addEventListener('touchstart',function(e){
            e.stopPropagation();
            var nk=b.getAttribute('data-mchip');
            if(socket) socket.emit('adminChangeMap',{mapKey:nk});
            cmk=nk; cm=MAPS[nk]||MAPS.classic;
            setTimeout(buildAdm,50);
        },{passive:true});
    });

    // Oyuncu listesi - tüm oyuncular (aktif + izleyici)
    var allPlayers={};
    // Önce P'den (oyun içi)
    for(var pid in P){ allPlayers[pid]=P[pid]; }
    // Sonra lobbyData'dan (izleyiciler dahil)
    if(lobbyData&&lobbyData.players){
        for(var lpid in lobbyData.players){
            if(!allPlayers[lpid]) allPlayers[lpid]=lobbyData.players[lpid];
        }
    }

    var pl=$('admPL');
    for(var apid in allPlayers){
        if(apid===myId) continue; // kendini listeleme
        var ap=allPlayers[apid]; if(!ap) continue;
        var tIcon=ap.team==='red'?'🔴':ap.team==='blue'?'🔵':'👁️';
        var row=document.createElement('div'); row.className='apr';
        row.innerHTML='<span class="an">'+tIcon+' '+escHtml(ap.name||'?')+'</span>'
            +'<button style="background:#e74c3c;font-size:8px;padding:3px 5px;border:none;border-radius:3px;color:#fff;cursor:pointer" data-at="red" data-ap2="'+apid+'">K</button>'
            +'<button style="background:#3498db;font-size:8px;padding:3px 5px;border:none;border-radius:3px;color:#fff;cursor:pointer" data-at="blue" data-ap2="'+apid+'">M</button>'
            +'<button style="background:#555;font-size:8px;padding:3px 5px;border:none;border-radius:3px;color:#fff;cursor:pointer" data-at="spectator" data-ap2="'+apid+'">İ</button>'
            +'<button style="background:#7a2e2e;font-size:8px;padding:3px 5px;border:none;border-radius:3px;color:#fff;cursor:pointer" data-kp="'+apid+'">🚫</button>';
        pl.appendChild(row);
    }

    pl.querySelectorAll('[data-ap2]').forEach(function(b){
        b.addEventListener('click',function(e){
            e.stopPropagation();
            if(socket) socket.emit('adminChangeTeam',{pid:b.getAttribute('data-ap2'),team:b.getAttribute('data-at')});
        });
        b.addEventListener('touchstart',function(e){
            e.stopPropagation();
            if(socket) socket.emit('adminChangeTeam',{pid:b.getAttribute('data-ap2'),team:b.getAttribute('data-at')});
        },{passive:true});
    });
    pl.querySelectorAll('[data-kp]').forEach(function(b){
        b.addEventListener('click',function(e){
            e.stopPropagation();
            if(socket) socket.emit('adminKick',{pid:b.getAttribute('data-kp')});

        b.addEventListener('touchstart',function(e){
            e.stopPropagation();
            if(socket) socket.emit('adminKick',{pid:b.getAttribute('data-kp')});
        },{passive:true});
    });
}

// Parmak nereye basılırsa base oraya gelir
var jZ=$('joyZone'), jBs=$('joyBase'), jTh=$('joyThumb');
var jTid=null, jA=false, jBaseX=0, jBaseY=0;
var JR=55; // joystick yarıçapı (px)
var JDZ=6; // dead zone (px)

// joyZone tüm sol ekrana yayılsın dinamik olarak
function setJoyZone(){
    jZ.style.left='0';
    jZ.style.bottom='0';
    jZ.style.width=Math.floor(window.innerWidth*0.45)+'px';
    jZ.style.height=Math.floor(window.innerHeight*0.7)+'px';
}
window.addEventListener('resize',setJoyZone);
setJoyZone();

jZ.addEventListener('touchstart',function(e){
    e.preventDefault();
    if(jTid!==null) return;
    var t=e.changedTouches[0];
    jTid=t.identifier; jA=true;
    // Base, parmağın tam altına gelir
    jBaseX=t.clientX; jBaseY=t.clientY;
    jBs.style.left=(jBaseX-55)+'px';
    jBs.style.top=(jBaseY-55)+'px';
    jBs.style.display='block';
    jBs.style.opacity='0.5';
    jTh.style.display='block';
    jTh.style.opacity='0.75';
    updJ(t.clientX,t.clientY);
},{passive:false});

jZ.addEventListener('touchmove',function(e){
    e.preventDefault();
    for(var i=0;i<e.changedTouches.length;i++){
        if(e.changedTouches[i].identifier===jTid) updJ(e.changedTouches[i].clientX,e.changedTouches[i].clientY);
    }
},{passive:false});

function jRelease(){
    jTid=null; jA=false; myIn.dx=0; myIn.dy=0;
    jBs.style.display='none'; jTh.style.display='none';
}
jZ.addEventListener('touchend',function(e){
    e.preventDefault();
    for(var i=0;i<e.changedTouches.length;i++){
        if(e.changedTouches[i].identifier===jTid) jRelease();
    }
},{passive:false});
jZ.addEventListener('touchcancel',function(e){
    for(var i=0;i<e.changedTouches.length;i++){
        if(e.changedTouches[i].identifier===jTid) jRelease();
    }
},{passive:false});

function updJ(tx,ty){
    var dx=tx-jBaseX, dy=ty-jBaseY;
    var d=Math.sqrt(dx*dx+dy*dy);
    // Dead zone
    if(d<JDZ){ myIn.dx=0; myIn.dy=0; jTh.style.left=jBaseX+'px'; jTh.style.top=jBaseY+'px'; return; }
    var cd=Math.min(d,JR), a=Math.atan2(dy,dx);
    myIn.dx=Math.cos(a)*cd/JR; myIn.dy=Math.sin(a)*cd/JR;
    jTh.style.left=(jBaseX+Math.cos(a)*cd)+'px';
    jTh.style.top=(jBaseY+Math.sin(a)*cd)+'px';
}

    if(gameState!=='game') return;
    var k=e.key.toLowerCase(); keys[k]=true;
    if(k===' '||k==='x') kH=true;
    if(k==='z'&&passCD<=0){ pH=true; kH=true; }
    if(k==='c'&&pwCD<=0){ pwP=true; kH=true; }
    updK();
});
document.addEventListener('keyup',function(e){
    var k=e.key.toLowerCase(); keys[k]=false;
    if(k===' '||k==='x') kH=false;
    if(k==='z'){ pH=false; kH=false; }
    if(k==='c') kH=false;
    updK();
});
function updK(){
    if(jA) return;
    var dx=0, dy=0;
    if(keys['w']||keys['arrowup']) dy=-1;
    if(keys['s']||keys['arrowdown']) dy=1;
    if(keys['a']||keys['arrowleft']) dx=-1;
    if(keys['d']||keys['arrowright']) dx=1;
    myIn.dx=dx; myIn.dy=dy;
}

// --- Topla temas tespiti: her state güncellemesinde kontrol edilir ---
// Ayrıca: 'passDone' event'i ile sunucu haberdar edebilir (server.js güncellenecekse)
// Şimdilik: pH aktifken topa dokunulduğu frame'de (mesafe PR+BR+5 içinde) CD başlar
var passContactCheck=false;
var _origApplyState=applyState;
// Override applyState to detect pass contact
applyState=function(data){
    _origApplyState(data);
    if(pH&&!passTouched&&passCD<=0){
        // Ben topa dokunuyor muyum?
        var me=P[myId];
        if(me&&me.team!=='spectator'){
            var bd=dst(me.x||me.tx||0,me.y||me.ty||0, B.x||B.tx||0, B.y||B.ty||0);

                passTouched=true;
                passCD=PASS_CD_TICKS; // 7 sn

        }
    }
};
